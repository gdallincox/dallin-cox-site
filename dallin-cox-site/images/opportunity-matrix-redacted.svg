<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 900" role="img" aria-label="Redacted opportunity matrix: a two-by-two grid plotting current visit volume against projected population growth. City labels are blurred for competitive confidentiality.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#070B17"/>
    </linearGradient>
    <filter id="redact" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <radialGradient id="investGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="450" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <text x="28" y="42" fill="#F97316" font-size="10" letter-spacing="2" font-weight="600">GEOGRAPHIC STRATEGY</text>
    <text x="28" y="78" fill="#F3F4F6" font-size="26" font-weight="700" letter-spacing="-0.5">Opportunity Matrix</text>
    <text x="28" y="104" fill="#9CA3AF" font-size="12" font-weight="400">Visit Volume × Projected Growth (2050)</text>
    <line x1="28" y1="124" x2="422" y2="124" stroke="#1F2640" stroke-width="1"/>
  </g>

  <!-- Y-axis label (rotated) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" fill="#6B7280" font-size="9" letter-spacing="1.5" font-weight="500">
    <text x="-430" y="22" transform="rotate(-90)">PROJECTED GROWTH →</text>
  </g>

  <!-- Matrix frame -->
  <g>
    <!-- INVEST quadrant glow background -->
    <rect x="225" y="160" width="185" height="210" fill="url(#investGlow)"/>

    <!-- Quadrant dividers -->
    <line x1="40" y1="265" x2="410" y2="265" stroke="#1F2640" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="225" y1="160" x2="225" y2="580" stroke="#1F2640" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- Outer frame -->
    <rect x="40" y="160" width="370" height="420" fill="none" stroke="#2A3354" stroke-width="1" rx="4"/>

    <!-- Quadrant labels -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="9" letter-spacing="1.5" font-weight="600">
      <text x="54" y="180" fill="#9CA3AF">EMERGING</text>
      <text x="239" y="180" fill="#F97316">INVEST</text>
      <text x="54" y="285" fill="#6B7280">MONITOR</text>
      <text x="239" y="285" fill="#FBBF24">DEFEND</text>
    </g>

    <!-- INVEST quadrant dots (high volume, high growth) -->
    <g>
      <circle cx="300" cy="210" r="11" fill="#F97316" fill-opacity="0.9"/>
      <rect x="316" y="205" width="52" height="9" fill="#F97316" fill-opacity="0.25" filter="url(#redact)" rx="2"/>

      <circle cx="355" cy="235" r="9" fill="#F97316" fill-opacity="0.85"/>
      <rect x="310" y="230" width="42" height="8" fill="#F97316" fill-opacity="0.22" filter="url(#redact)" rx="2"/>

      <circle cx="275" cy="245" r="8" fill="#FB923C" fill-opacity="0.9"/>
      <rect x="287" y="241" width="48" height="8" fill="#FB923C" fill-opacity="0.22" filter="url(#redact)" rx="2"/>

      <circle cx="335" cy="190" r="7" fill="#FB923C" fill-opacity="0.85"/>
      <rect x="268" y="186" width="40" height="7" fill="#FB923C" fill-opacity="0.2" filter="url(#redact)" rx="2"/>

      <circle cx="380" cy="215" r="6" fill="#FBBF24" fill-opacity="0.85"/>
      <rect x="330" y="212" width="36" height="7" fill="#FBBF24" fill-opacity="0.2" filter="url(#redact)" rx="2"/>
    </g>

    <!-- EMERGING quadrant dots (low volume, high growth) -->
    <g>
      <circle cx="100" cy="220" r="5" fill="#FBBF24" fill-opacity="0.7"/>
      <rect x="110" y="217" width="34" height="7" fill="#FBBF24" fill-opacity="0.18" filter="url(#redact)" rx="2"/>

      <circle cx="165" cy="245" r="4" fill="#FBBF24" fill-opacity="0.65"/>
      <rect x="122" y="242" width="30" height="6" fill="#FBBF24" fill-opacity="0.16" filter="url(#redact)" rx="2"/>

      <circle cx="135" cy="195" r="4" fill="#FCD34D" fill-opacity="0.6"/>
      <rect x="85" y="192" width="38" height="6" fill="#FCD34D" fill-opacity="0.16" filter="url(#redact)" rx="2"/>
    </g>

    <!-- DEFEND quadrant dots (high volume, moderate growth) -->
    <g>
      <circle cx="290" cy="340" r="12" fill="#FBBF24" fill-opacity="0.85"/>
      <rect x="307" y="335" width="54" height="9" fill="#FBBF24" fill-opacity="0.25" filter="url(#redact)" rx="2"/>

      <circle cx="360" cy="390" r="11" fill="#FBBF24" fill-opacity="0.8"/>
      <rect x="300" y="386" width="46" height="9" fill="#FBBF24" fill-opacity="0.22" filter="url(#redact)" rx="2"/>

      <circle cx="320" cy="440" r="8" fill="#F59E0B" fill-opacity="0.75"/>
      <rect x="335" y="436" width="42" height="8" fill="#F59E0B" fill-opacity="0.2" filter="url(#redact)" rx="2"/>

      <circle cx="255" cy="490" r="7" fill="#F59E0B" fill-opacity="0.7"/>
      <rect x="268" y="486" width="38" height="7" fill="#F59E0B" fill-opacity="0.18" filter="url(#redact)" rx="2"/>

      <circle cx="385" cy="335" r="6" fill="#F59E0B" fill-opacity="0.7"/>
      <rect x="327" y="332" width="34" height="7" fill="#F59E0B" fill-opacity="0.18" filter="url(#redact)" rx="2"/>
    </g>

    <!-- MONITOR quadrant dots (low volume, low growth) -->
    <g>
      <circle cx="110" cy="460" r="3.5" fill="#6B7280" fill-opacity="0.55"/>
      <rect x="118" y="457" width="26" height="6" fill="#6B7280" fill-opacity="0.14" filter="url(#redact)" rx="2"/>

      <circle cx="155" cy="510" r="3" fill="#6B7280" fill-opacity="0.5"/>
      <rect x="113" y="507" width="30" height="6" fill="#6B7280" fill-opacity="0.12" filter="url(#redact)" rx="2"/>

      <circle cx="90" cy="540" r="3" fill="#6B7280" fill-opacity="0.5"/>
      <rect x="98" y="538" width="28" height="6" fill="#6B7280" fill-opacity="0.12" filter="url(#redact)" rx="2"/>
    </g>
  </g>

  <!-- X-axis label -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" fill="#6B7280" font-size="9" letter-spacing="1.5" font-weight="500">
    <text x="40" y="605">CURRENT VISIT VOLUME →</text>
  </g>

  <!-- Data summary chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <g transform="translate(28, 640)">
      <rect x="0" y="0" width="394" height="58" fill="#0F1428" stroke="#1F2640" stroke-width="1" rx="6"/>
      <text x="14" y="20" fill="#9CA3AF" font-size="9" letter-spacing="1.5" font-weight="600">METHODOLOGY</text>
      <text x="14" y="40" fill="#E5E7EB" font-size="11" font-weight="500">12 months · 355 ZIP codes · 18 states</text>
      <text x="14" y="52" fill="#6B7280" font-size="10">UPC · MAG · Gardner Institute projections</text>
    </g>

    <g transform="translate(28, 716)">
      <rect x="0" y="0" width="185" height="72" fill="#0F1428" stroke="#1F2640" stroke-width="1" rx="6"/>
      <text x="14" y="20" fill="#9CA3AF" font-size="9" letter-spacing="1.5" font-weight="600">TOTAL VISITS</text>
      <text x="14" y="44" fill="#F3F4F6" font-size="22" font-weight="700">133,235</text>
      <text x="14" y="62" fill="#6B7280" font-size="9">Oct 2024 – Sep 2025</text>
    </g>

    <g transform="translate(225, 716)">
      <rect x="0" y="0" width="197" height="72" fill="#0F1428" stroke="#1F2640" stroke-width="1" rx="6"/>
      <text x="14" y="20" fill="#9CA3AF" font-size="9" letter-spacing="1.5" font-weight="600">PROJECTION HORIZON</text>
      <text x="14" y="44" fill="#F3F4F6" font-size="22" font-weight="700">2050</text>
      <text x="14" y="62" fill="#6B7280" font-size="9">City-level, Utah County</text>
    </g>
  </g>

  <!-- Footer / redaction watermark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <line x1="28" y1="820" x2="422" y2="820" stroke="#1F2640" stroke-width="1"/>
    <circle cx="36" cy="848" r="3" fill="#F97316"/>
    <text x="46" y="852" fill="#F97316" font-size="9" letter-spacing="1.5" font-weight="600">REDACTED</text>
    <text x="111" y="852" fill="#6B7280" font-size="9">City labels withheld for competitive confidentiality</text>
  </g>
</svg>
