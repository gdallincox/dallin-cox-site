<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 1110" role="img">
<title>Current-state PA tracking system, version 0</title>
<desc>Vertical flowchart of the manual prior authorization tracking process used today. Every staff action is shown in coral; two decision points are gray. The right panel represents the underlying spreadsheet structure with three sections — Section 1 for patients with active PAs but no scheduled appointment, Section 2 for patients needing a new PA or reauthorization, and Section 3 for patients with active PAs sorted by next appointment — overlaid with a manual color-coded scheme across five dimensions. The daily cycle return arrow loops the entire process back to its starting point each business day.</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #3d3d3a; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; }
.arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
.c-coral { fill: #FAECE7; stroke: #993C1D; }
.c-coral .th { fill: #712B13; stroke: none; }
.c-coral .ts { fill: #993C1D; stroke: none; }
.c-purple { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th { fill: #3C3489; stroke: none; }
.c-purple .ts { fill: #534AB7; stroke: none; }
.c-gray { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .th { fill: #444441; stroke: none; }
.c-gray .ts { fill: #5F5E5A; stroke: none; }
@media (prefers-color-scheme: dark) {
  text { fill: #c2c0b6; }
  .arr { stroke: #b4b2a9; }
  .c-coral { fill: #4A1B0C; stroke: #F0997B; }
  .c-coral .th { fill: #F5C4B3; }
  .c-coral .ts { fill: #F0997B; }
  .c-purple { fill: #26215C; stroke: #AFA9EC; }
  .c-purple .th { fill: #CECBF6; }
  .c-purple .ts { fill: #AFA9EC; }
  .c-gray { fill: #2C2C2A; stroke: #B4B2A9; }
  .c-gray .th { fill: #D3D1C7; }
  .c-gray .ts { fill: #B4B2A9; }
}
</style>
</defs>

<rect class="c-coral" x="40" y="22" width="14" height="14" rx="3" stroke-width="0.5"/>
<text class="ts" x="60" y="29" dominant-baseline="central">Manual</text>
<rect class="c-gray" x="120" y="22" width="14" height="14" rx="3" stroke-width="0.5"/>
<text class="ts" x="140" y="29" dominant-baseline="central">Decision</text>
<rect class="c-purple" x="210" y="22" width="14" height="14" rx="3" stroke-width="0.5"/>
<text class="ts" x="230" y="29" dominant-baseline="central">Data</text>

<text class="th" x="555" y="82" text-anchor="middle">The spreadsheet</text>

<g class="c-purple">
<rect x="470" y="100" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="121" text-anchor="middle" dominant-baseline="central">Section 1</text>
<text class="ts" x="555" y="139" text-anchor="middle" dominant-baseline="central">No upcoming appt</text>
</g>

<g class="c-purple">
<rect x="470" y="168" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="189" text-anchor="middle" dominant-baseline="central">Section 2</text>
<text class="ts" x="555" y="207" text-anchor="middle" dominant-baseline="central">Needs new PA</text>
</g>

<g class="c-purple">
<rect x="470" y="236" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="257" text-anchor="middle" dominant-baseline="central">Section 3</text>
<text class="ts" x="555" y="275" text-anchor="middle" dominant-baseline="central">Sorted by next appt</text>
</g>

<text class="ts" x="555" y="310" text-anchor="middle">Color-coded overlay</text>

<g class="c-coral">
<rect x="230" y="70" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="91" text-anchor="middle" dominant-baseline="central">Open spreadsheet</text>
<text class="ts" x="340" y="109" text-anchor="middle" dominant-baseline="central">Daily ritual begins</text>
</g>

<line x1="340" y1="126" x2="340" y2="154" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="154" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="175" text-anchor="middle" dominant-baseline="central">Re-sort Section 3</text>
<text class="ts" x="340" y="193" text-anchor="middle" dominant-baseline="central">By next appt date</text>
</g>

<line x1="340" y1="210" x2="340" y2="238" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="238" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="259" text-anchor="middle" dominant-baseline="central">Scan rows for expiring PAs</text>
<text class="ts" x="340" y="277" text-anchor="middle" dominant-baseline="central">Mental math, row by row</text>
</g>

<line x1="340" y1="294" x2="340" y2="322" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="322" width="200" height="56" rx="28" stroke-width="0.5"/>
<text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">Anything expiring?</text>
</g>

<line x1="340" y1="378" x2="340" y2="406" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="406" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="427" text-anchor="middle" dominant-baseline="central">Move row to Section 2</text>
<text class="ts" x="340" y="445" text-anchor="middle" dominant-baseline="central">Manual cut and paste</text>
</g>

<line x1="340" y1="462" x2="340" y2="490" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="490" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="518" text-anchor="middle" dominant-baseline="central">Submit PA request</text>
</g>

<line x1="340" y1="546" x2="340" y2="574" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="574" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="595" text-anchor="middle" dominant-baseline="central">Track in column G</text>
<text class="ts" x="340" y="613" text-anchor="middle" dominant-baseline="central">Wait for determination</text>
</g>

<line x1="340" y1="630" x2="340" y2="658" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="658" width="200" height="56" rx="28" stroke-width="0.5"/>
<text class="th" x="340" y="686" text-anchor="middle" dominant-baseline="central">Approved?</text>
</g>

<line x1="340" y1="714" x2="340" y2="742" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="742" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="763" text-anchor="middle" dominant-baseline="central">Log + move to Section 3</text>
<text class="ts" x="340" y="781" text-anchor="middle" dominant-baseline="central">Manual edit + paste</text>
</g>

<line x1="340" y1="798" x2="340" y2="826" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="826" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="847" text-anchor="middle" dominant-baseline="central">Update color coding</text>
<text class="ts" x="340" y="865" text-anchor="middle" dominant-baseline="central">By hand for each row</text>
</g>

<line x1="340" y1="882" x2="340" y2="910" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="230" y="910" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="931" text-anchor="middle" dominant-baseline="central">Save and close</text>
<text class="ts" x="340" y="949" text-anchor="middle" dominant-baseline="central">Until tomorrow</text>
</g>

<path d="M 340 966 L 340 996 L 15 996 L 15 98 L 230 98" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="80" y="985" text-anchor="middle">Daily cycle</text>
</svg>
