      <text y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Directed in-house by Dallin Cox &#8226; Execution by contracted SEO specialists &#8226; Ongoing program, metrics live as of Q2 2026</text>
