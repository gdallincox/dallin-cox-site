<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 900" role="img" aria-label="Concept mock of the daily supply count entry screen on mobile, showing the Provo clinic with a list of items to count, same-as-yesterday checkmarks, and a submit button.">
  <defs>
    <filter id="phoneShadow" x="-5%" y="-2%" width="110%" height="108%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Canvas bg -->
  <rect width="450" height="900" fill="#f1f5f9"/>

  <!-- Top app bar -->
  <g>
    <rect x="0" y="0" width="450" height="96" fill="#ffffff"/>
    <line x1="0" y1="96" x2="450" y2="96" stroke="#e2e8f0"/>

    <!-- Status bar dots (faux iOS) -->
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#0f1f3d" font-weight="600">9:41</text>
    <g transform="translate(380, 18)">
      <rect x="0" y="2" width="16" height="10" rx="2" fill="none" stroke="#0f1f3d" stroke-width="1.2"/>
      <rect x="2" y="4" width="12" height="6" rx="1" fill="#0f1f3d"/>
      <rect x="17" y="5" width="2" height="4" rx="0.5" fill="#0f1f3d"/>
    </g>

    <!-- Back + title + chip -->
    <path d="M 22 68 L 12 60 L 22 52" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#2563eb" font-weight="500">Back</text>

    <text x="225" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#0f1f3d" font-weight="700" text-anchor="middle">Daily Count</text>

    <g transform="translate(360, 48)">
      <rect width="72" height="28" rx="14" fill="#eff4ff"/>
      <circle cx="16" cy="14" r="4" fill="#ef4444"/>
      <text x="28" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#0f1f3d" font-weight="600">PROVO</text>
    </g>
  </g>

  <!-- Progress header -->
  <g transform="translate(0, 96)">
    <rect x="0" y="0" width="450" height="78" fill="#ffffff"/>
    <line x1="0" y1="78" x2="450" y2="78" stroke="#e2e8f0"/>

    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" letter-spacing="1.5" fill="#94a3b8" font-weight="600">TUESDAY · APR 21, 2026</text>
    <text x="28" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="500">3 of 4 clinics complete</text>

    <!-- Progress bar -->
    <rect x="28" y="60" width="394" height="6" rx="3" fill="#eff4ff"/>
    <rect x="28" y="60" width="296" height="6" rx="3" fill="#2563eb"/>
  </g>

  <!-- Items list -->
  <g transform="translate(0, 174)">
    <!-- Item 1: Avastin — BELOW MIN stepper -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>
      <line x1="28" y1="86" x2="422" y2="86" stroke="#f1f5f9"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">Avastin 1.25 mg</text>

      <g transform="translate(148, 14)">
        <rect width="80" height="18" rx="9" fill="#fee2e2"/>
        <text x="40" y="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="9" fill="#b91c1c" text-anchor="middle" font-weight="700" letter-spacing="0.5">BELOW MIN</text>
      </g>

      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 11 · Min 10</text>

      <!-- Stepper -->
      <g transform="translate(256, 52)">
        <circle cx="16" cy="16" r="16" fill="#f1f5f9"/>
        <path d="M 10 16 L 22 16" stroke="#0f1f3d" stroke-width="2" stroke-linecap="round"/>

        <rect x="40" y="2" width="56" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="68" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="700">8</text>

        <circle cx="120" cy="16" r="16" fill="#2563eb"/>
        <path d="M 114 16 L 126 16 M 120 10 L 120 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Item 2: Lucentis — stepper, OK -->
    <g transform="translate(0, 86)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>
      <line x1="28" y1="86" x2="422" y2="86" stroke="#f1f5f9"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">Lucentis 0.5 mg</text>
      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 9 · Min 6</text>

      <g transform="translate(256, 52)">
        <circle cx="16" cy="16" r="16" fill="#f1f5f9"/>
        <path d="M 10 16 L 22 16" stroke="#0f1f3d" stroke-width="2" stroke-linecap="round"/>

        <rect x="40" y="2" width="56" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="68" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#0f1f3d" text-anchor="middle" font-weight="600">9</text>

        <circle cx="120" cy="16" r="16" fill="#2563eb"/>
        <path d="M 114 16 L 126 16 M 120 10 L 120 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Item 3: Eylea — "Same as yesterday" checked -->
    <g transform="translate(0, 172)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>
      <line x1="28" y1="86" x2="422" y2="86" stroke="#f1f5f9"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">Eylea HD 8 mg</text>
      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 11 · Min 6</text>

      <!-- Same as yesterday pill (checked) -->
      <g transform="translate(232, 44)">
        <rect width="190" height="36" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
        <circle cx="22" cy="18" r="10" fill="#10b981"/>
        <path d="M 17 18 L 21 22 L 27 14" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#065f46" font-weight="600">Same as yesterday</text>
      </g>
    </g>

    <!-- Item 4: Triamcinolone — BELOW MIN -->
    <g transform="translate(0, 258)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>
      <line x1="28" y1="86" x2="422" y2="86" stroke="#f1f5f9"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">Triamcinolone 40 mg/mL</text>

      <g transform="translate(184, 14)">
        <rect width="80" height="18" rx="9" fill="#fee2e2"/>
        <text x="40" y="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="9" fill="#b91c1c" text-anchor="middle" font-weight="700" letter-spacing="0.5">BELOW MIN</text>
      </g>

      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 4 · Min 4</text>

      <g transform="translate(256, 52)">
        <circle cx="16" cy="16" r="16" fill="#f1f5f9"/>
        <path d="M 10 16 L 22 16" stroke="#0f1f3d" stroke-width="2" stroke-linecap="round"/>

        <rect x="40" y="2" width="56" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="68" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="700">2</text>

        <circle cx="120" cy="16" r="16" fill="#2563eb"/>
        <path d="M 114 16 L 126 16 M 120 10 L 120 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Item 5: 27G needles — Same as yesterday -->
    <g transform="translate(0, 344)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>
      <line x1="28" y1="86" x2="422" y2="86" stroke="#f1f5f9"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">27G × 1/2" needles</text>
      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 4 · Min 3</text>

      <g transform="translate(232, 44)">
        <rect width="190" height="36" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
        <circle cx="22" cy="18" r="10" fill="#10b981"/>
        <path d="M 17 18 L 21 22 L 27 14" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#065f46" font-weight="600">Same as yesterday</text>
      </g>
    </g>

    <!-- Item 6: Betadine — stepper -->
    <g transform="translate(0, 430)">
      <rect x="0" y="0" width="450" height="86" fill="#ffffff"/>

      <text x="28" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0f1f3d" font-weight="600">Betadine 5% ophthalmic</text>
      <text x="28" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Yesterday: 13 · Min 8</text>

      <g transform="translate(256, 52)">
        <circle cx="16" cy="16" r="16" fill="#f1f5f9"/>
        <path d="M 10 16 L 22 16" stroke="#0f1f3d" stroke-width="2" stroke-linecap="round"/>

        <rect x="40" y="2" width="56" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="68" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#0f1f3d" text-anchor="middle" font-weight="600">12</text>

        <circle cx="120" cy="16" r="16" fill="#2563eb"/>
        <path d="M 114 16 L 126 16 M 120 10 L 120 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- Bottom CTA -->
  <g transform="translate(0, 800)">
    <rect x="0" y="0" width="450" height="100" fill="#ffffff"/>
    <line x1="0" y1="0" x2="450" y2="0" stroke="#e2e8f0"/>

    <rect x="28" y="20" width="394" height="52" rx="12" fill="#0f1f3d"/>
    <text x="225" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="600">Submit daily count</text>

    <!-- Home indicator -->
    <rect x="165" y="84" width="120" height="4" rx="2" fill="#0f1f3d" fill-opacity="0.2"/>
  </g>
</svg>
